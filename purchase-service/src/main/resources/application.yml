spring:
  application:
    name: purchase-service
  datasource:
    url: jdbc:postgresql://purchase-postgres:5432/purchase_db
    username: purchase_user
    password: purchase_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

server:
  port: 8085

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposeOnlyForDevelopmentAndTestingEnvironment}

tour-service:
  url: ${TOUR_SERVICE_URL:http://tour-service:8083}

stakeholders-service:
  url: ${STAKEHOLDERS_SERVICE_URL:http://stakeholders-service:8081/api}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9095}

logging:
  level:
    root: INFO
    com.soa: DEBUG
