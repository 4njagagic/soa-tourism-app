services:
  postgres:
    image: postgres:15-alpine
    container_name: stakeholders-db
    environment:
      POSTGRES_USER: ${STAKEHOLDERS_DB_USER}
      POSTGRES_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD}
      POSTGRES_DB: ${STAKEHOLDERS_DB_NAME}
    ports:
      - "${STAKEHOLDERS_DB_HOST_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - soa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAKEHOLDERS_DB_USER} -d ${STAKEHOLDERS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  blog-postgres:
    image: postgres:15-alpine
    container_name: blog-db
    environment:
      POSTGRES_USER: ${BLOG_DB_USER}
      POSTGRES_PASSWORD: ${BLOG_DB_PASSWORD}
      POSTGRES_DB: ${BLOG_DB_NAME}
    ports:
      - "${BLOG_DB_HOST_PORT}:5432"
    volumes:
      - blog-postgres-data:/var/lib/postgresql/data
    networks:
      - soa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BLOG_DB_USER} -d ${BLOG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: tour-mongo
    ports:
      - "${TOUR_MONGO_HOST_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${TOUR_MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${TOUR_MONGO_ROOT_PASSWORD:-rootpass}
      MONGO_INITDB_DATABASE: ${TOUR_MONGO_DB_NAME:-tourism}
    volumes:
      - mongo-data:/data/db
    networks:
      - soa-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  stakeholders-service:
    build:
      context: ./stakeholders-service
      dockerfile: Dockerfile
    container_name: stakeholders-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${STAKEHOLDERS_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${STAKEHOLDERS_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SERVER_PORT: ${STAKEHOLDERS_SERVICE_PORT}
    ports:
      - "${STAKEHOLDERS_SERVICE_PORT}:${STAKEHOLDERS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - soa-network
    restart: unless-stopped

  blog-service:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    container_name: blog-service
    environment:
      PORT: ${BLOG_SERVICE_PORT}
      UPLOAD_DIR: /app/uploads
      DB_HOST: blog-postgres
      DB_PORT: 5432
      DB_NAME: ${BLOG_DB_NAME}
      DB_USER: ${BLOG_DB_USER}
      DB_PASSWORD: ${BLOG_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BLOG_SERVICE_PORT}:${BLOG_SERVICE_PORT}"
    user: "0:0"
    volumes:
      - blog-uploads-data:/app/uploads
    depends_on:
      blog-postgres:
        condition: service_healthy
    networks:
      - soa-network
    restart: unless-stopped

  tour-service:
    build:
      context: ./tour-service
      dockerfile: Dockerfile
    container_name: tour-service
    environment:
      ASPNETCORE_URLS: http://+:${TOUR_SERVICE_PORT:-8083}
      TOUR_MONGO_URI: ${TOUR_MONGO_URI:-mongodb://root:rootpass@mongo:27017}
      TOUR_MONGO_DB_NAME: ${TOUR_MONGO_DB_NAME:-tourism}
      JWT_SECRET: ${JWT_SECRET}
      STAKEHOLDERS_SERVICE_URL: http://stakeholders-service:${STAKEHOLDERS_SERVICE_PORT}/api
      UPLOAD_DIR: /app/uploads
    ports:
      - "${TOUR_SERVICE_PORT:-8083}:${TOUR_SERVICE_PORT:-8083}"
    volumes:
      - tour-uploads-data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      stakeholders-service:
        condition: service_started
    networks:
      - soa-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_BLOG_API_URL: ${VITE_BLOG_API_URL}
        VITE_TOUR_API_URL: ${VITE_TOUR_API_URL}
    container_name: soa-tourism-frontend
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}"
    depends_on:
      - stakeholders-service
      - blog-service
      - tour-service
    networks:
      - soa-network
    restart: unless-stopped

volumes:
  postgres-data:
  blog-postgres-data:
  blog-uploads-data:
  mongo-data:
  tour-uploads-data:

networks:
  soa-network:
    driver: bridge
