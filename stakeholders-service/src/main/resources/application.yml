spring:
  application:
    name: stakeholders-service
  datasource:
    url: jdbc:postgresql://postgres:5432/stakeholders_db
    username: stakeholders_user
    password: stakeholders_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.soa: DEBUG
